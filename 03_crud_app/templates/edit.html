<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Mahasiswa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ed8936 0%, #e53e3e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #ed8936;
            box-shadow: 0 0 5px rgba(237, 137, 54, 0.3);
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        
        .btn-warning {
            background: #ed8936;
            color: white;
        }
        
        .btn-secondary {
            background: #a0aec0;
            color: white;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }
        
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .info-id {
            background: #edf2f7;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✏️ Edit Mahasiswa</h1>
            <p>Ubah data mahasiswa</p>
        </div>
        
        <div class="content">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <div class="info-id">
                <strong>ID:</strong> {{ mhs.id }}
            </div>
            
            <form method="POST">
                <div class="form-group">
                    <label for="nama">Nama Lengkap:</label>
                    <input type="text" id="nama" name="nama" value="{{ mhs.nama }}" required>
                </div>
                
                <div class="form-group">
                    <label for="nim">NIM:</label>
                    <input type="text" id="nim" name="nim" value="{{ mhs.nim }}" required>
                </div>
                
                <div class="form-group">
                    <label for="jurusan">Jurusan:</label>
                    <select id="jurusan" name="jurusan" required>
                        <option value="">Pilih Jurusan</option>
                        <option value="Teknik Informatika" {% if mhs.jurusan == 'Teknik Informatika' %}selected{% endif %}>Teknik Informatika</option>
                        <option value="Sistem Informasi" {% if mhs.jurusan == 'Sistem Informasi' %}selected{% endif %}>Sistem Informasi</option>
                        <option value="Teknik Komputer" {% if mhs.jurusan == 'Teknik Komputer' %}selected{% endif %}>Teknik Komputer</option>
                        <option value="Manajemen Informatika" {% if mhs.jurusan == 'Manajemen Informatika' %}selected{% endif %}>Manajemen Informatika</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="angkatan">Tahun Angkatan:</label>
                    <select id="angkatan" name="angkatan" required>
                        <option value="">Pilih Angkatan</option>
                        <option value="2020" {% if mhs.angkatan == 2020 %}selected{% endif %}>2020</option>
                        <option value="2021" {% if mhs.angkatan == 2021 %}selected{% endif %}>2021</option>
                        <option value="2022" {% if mhs.angkatan == 2022 %}selected{% endif %}>2022</option>
                        <option value="2023" {% if mhs.angkatan == 2023 %}selected{% endif %}>2023</option>
                        <option value="2024" {% if mhs.angkatan == 2024 %}selected{% endif %}>2024</option>
                        <option value="2025" {% if mhs.angkatan == 2025 %}selected{% endif %}>2025</option>
                    </select>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn btn-warning">💾 Update Data</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">❌ Batal</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
